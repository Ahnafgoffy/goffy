<html>
    <head>
        <title>todayigotchuck</title>
    </head>
    <body>
        <button onclick="ascending">COOKIE</button>
        <button onclick="descending">NACHO</button>
        <p id="result"></p>
        <script>
            var points = [40,100,25,1,5];
           document.getElementById("result").innerHTML = points;
           function ascending() {
            points.sort (function(a,b) {
                return a-b;
            }
           }
           document.getElementById("result").innerHTML = points;
           function descending() {
            points.sort (function(a,b) {
                return b-a;
            }
           }
        </script>
    </body>
</html>
